# Publish amlhpc to PyPI on a version tag (e.g. v0.5.0).
#
# Uses PyPI Trusted Publishing (OpenID Connect) — no API token or stored
# secret is required. One-time setup on PyPI:
#   pypi.org -> your projects -> amlhpc -> Manage -> Publishing -> Add publisher
#     Owner:       hmeiland
#     Repository:  amlhpc
#     Workflow:    publish.yml
#     Environment: pypi
#
# Release flow:
#   1. poetry version <patch|minor|major>      # bump; commit + push to main
#   2. git tag "v$(poetry version --short)"     # e.g. v0.5.1
#   3. git push origin --tags                    # tag push triggers this workflow

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions: {}   # no permissions by default; each job requests only what it needs

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Verify git tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(poetry version --short)"
          echo "git tag: v${TAG}  |  pyproject: ${PKG}"
          if [ "${TAG}" != "${PKG}" ]; then
            echo "::error::Tag v${TAG} does not match pyproject version ${PKG}. Bump the version or fix the tag."
            exit 1
          fi

      - name: Build sdist and wheel
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/amlhpc
    permissions:
      id-token: write   # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
